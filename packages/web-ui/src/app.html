<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<!-- Dual theme-color: browser picks the matching media. The light value
		     stays in effect for OS=light, dark for OS=dark. iOS PWA installed
		     status-bar style is a known limitation (cannot live-toggle). -->
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#050510" />
		<meta name="description" content="Run your business. Not your tools." />

		<!-- PWA manifest (installable, no service worker) -->
		<link rel="manifest" href="/manifest.json" />
		<link rel="icon" href="/favicon.png" />

		<!-- Apple PWA -->
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="lynox" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

		<title>lynox</title>

		<!--
			Light-Mode FOUC guard. Synchronous, runs BEFORE SvelteKit hydrates
			so the data-theme attribute is set before first paint. Strict
			allowlist on the localStorage value (defense-in-depth against any
			vector that writes lyx-theme from outside our setTheme API).
		-->
		<script>
			(function () {
				try {
					var stored = null;
					try { stored = localStorage.getItem('lyx-theme'); } catch (e) { /* private mode */ }
					var resolved;
					if (stored === 'light' || stored === 'dark') {
						resolved = stored;
					} else {
						resolved = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
					}
					document.documentElement.setAttribute('data-theme', resolved);
				} catch (e) {
					document.documentElement.setAttribute('data-theme', 'dark');
				}
			})();
		</script>

		<!--
			Cold-start stale-bundle guard. Runs BEFORE SvelteKit hydrates so
			it works even when cached chunk hashes 404 against the new
			deploy (the case that broke a customer's PWA session + the
			operator's voice send). The placeholder is replaced server-side by
			hooks.server.ts; in dev / non-CI builds it stays as the literal
			string and the script no-ops.
		-->
		<script>
			(function () {
				var bundleSha = '__LYNOX_BUILD_SHA__';
				if (!bundleSha || bundleSha.indexOf('__LYNOX_') === 0) return;
				try {
					fetch('/api/health', { cache: 'no-store', credentials: 'same-origin' })
						.then(function (r) { return r.ok ? r.json() : null; })
						.then(function (d) {
							if (!d || typeof d.build_sha !== 'string' || !d.build_sha) return;
							if (d.build_sha === bundleSha) return;
							if (window.__lynoxStaleReloadFired) return;
							window.__lynoxStaleReloadFired = true;
							var url = new URL(location.href);
							url.searchParams.set('_v', d.build_sha.slice(0, 8));
							location.replace(url.toString());
						})
						.catch(function () { /* offline: keep working */ });
				} catch (e) { /* ancient browser: noop */ }
			})();
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
