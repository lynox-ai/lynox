name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work? Be as specific as you can.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you try or consider?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI / REPL
        - Memory / RAG
        - Pipelines / DAG
        - Tools
        - Telegram
        - MCP Server
        - DataStore
        - Docker / Deployment
        - Other
    validations:
      required: true
