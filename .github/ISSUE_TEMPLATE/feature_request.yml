name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work? Be as specific as you can.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you try or consider?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI / Installer
        - Web UI / PWA
        - Knowledge Graph / Memory
        - Workflows / Background Worker
        - Tools / Integrations
        - Mail / Inbox
        - Google Workspace
        - LLM Providers (Anthropic / Mistral / OpenAI-compat)
        - Docker / Self-host deployment
        - Managed hosting
        - Docs
        - Other
    validations:
      required: true
