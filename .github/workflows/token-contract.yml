name: Token Contract

# The brand primitives in packages/web-ui/src/app.css are painted on more than one
# surface — this product UI, and the lynox.ai marketing site, which is a separate
# codebase and cannot depend on this package. tokens.contract.json is the contract
# that keeps that duplication honest, and this asserts app.css still matches it.
#
# It exists here, on the side that OWNS the values, because the check used to exist
# only on the other side: a token changed HERE was caught THERE, at the next CSS
# commit, by whoever happened to touch that file — and in practice not at all, since
# that check resolved this repo through a relative path and exited 0 silently
# whenever it wasn't found, which is to say in every CI run. A guard that skips
# itself is not a guard.
#
# The lefthook pre-commit hook runs the same check locally; this job is the
# unbypassable gate (`git commit --no-verify` skips the hook, not this).
# Make it a required status check on main.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  token-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: '22' }
      - name: app.css still matches tokens.contract.json
        run: node packages/web-ui/scripts/check-token-contract.mjs
