name: Positioning Guard

# Keeps public marketing/category copy aligned with the canonical positioning
# (pro/docs/internal/POSITIONING.md → Vocabulary → Avoid): no legacy category
# labels ("AI engine", "agent runtime"), no OSI-flavoured "open source" (lynox
# is ELv2, not OSI-approved), no tired "The AI that…" patterns. The lefthook
# pre-push hook runs the same scan locally; this job is the gate — `git push
# --no-verify` skips the hook, not this. It IS a required status check on main.
#
# Not "unbypassable" though, as this comment used to claim: `enforce_admins` is
# false, so `gh pr merge --admin` overrides every required check.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  positioning-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Scan public copy surfaces for positioning drift
        run: bash scripts/positioning-guard.sh
