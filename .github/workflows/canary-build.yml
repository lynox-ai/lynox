name: Canary Image

# Builds a Docker image from feature/fix/canary branches so a single managed
# instance can be pinned to it for testing. The image is pushed to ghcr.io
# with two tags — one branch-stable, one immutable per commit:
#   ghcr.io/lynox-ai/lynox:branch-<slug>
#   ghcr.io/lynox-ai/lynox:sha-<short>
# Promotion to a managed instance is a separate manual step via the admin API
# (`POST /admin/updates/instance/<id>` with `{targetVersion:"branch-<slug>"}`).
# This workflow never touches a running instance.
#
# Security note on inputs:
#   github.ref_name / github.sha are read into env vars (REF_NAME, GITHUB_SHA)
#   and never interpolated directly into shell. The slug computation uses
#   `printf '%s'` so even a hostile branch name (e.g. one containing `$()` or
#   backticks) cannot break out of the variable.

on:
  push:
    branches:
      - 'feat/**'
      - 'fix/**'
      - 'canary/**'
    paths-ignore: ['docs/**']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute branch slug + short sha
        id: meta
        env:
          REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Tag must match VALID_VERSION_RE in pro (update-manager.ts):
          #   ^[a-zA-Z0-9][a-zA-Z0-9._-]{0,127}$
          # Lowercase, replace any disallowed char with '-', collapse runs,
          # trim leading/trailing separators, then prefix and truncate to 128.
          SLUG=$(printf '%s' "$REF_NAME" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9._-]+/-/g; s/-+/-/g; s/^[._-]+//; s/[._-]+$//')
          BRANCH_TAG="branch-${SLUG}"
          BRANCH_TAG="${BRANCH_TAG:0:128}"
          BRANCH_TAG="${BRANCH_TAG%[._-]}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          SHA_TAG="sha-${SHORT_SHA}"
          echo "branch_tag=${BRANCH_TAG}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "Built tags: ${BRANCH_TAG}, ${SHA_TAG}"

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        id: build
        with:
          context: .
          load: true
          tags: ghcr.io/lynox-ai/lynox:scan-canary
          # Same build-args as the push step below so trivy scans the same
          # layers we ship and the gha cache is shared.
          build-args: |
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/lynox-ai/lynox:scan-canary
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/lynox-ai/lynox:${{ steps.meta.outputs.branch_tag }}
            ghcr.io/lynox-ai/lynox:${{ steps.meta.outputs.sha_tag }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}
            org.opencontainers.image.source=https://github.com/lynox-ai/lynox
            lynox.canary.branch=${{ github.ref_name }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        env:
          BRANCH_TAG: ${{ steps.meta.outputs.branch_tag }}
          SHA_TAG: ${{ steps.meta.outputs.sha_tag }}
        run: |
          {
            echo "## Canary image pushed"
            echo ""
            echo "| Tag | Use for |"
            echo "|-----|---------|"
            echo "| \`ghcr.io/lynox-ai/lynox:${BRANCH_TAG}\` | branch-stable, follows future pushes |"
            echo "| \`ghcr.io/lynox-ai/lynox:${SHA_TAG}\` | immutable, pinned to this commit |"
            echo ""
            echo "To deploy this canary image, run the \`/canary-deploy\` skill locally (operator-only)."
          } >> "$GITHUB_STEP_SUMMARY"
