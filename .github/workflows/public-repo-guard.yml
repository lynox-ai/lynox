name: Public-Repo Guard

# Blocks internal infrastructure / control-plane / ops leaks from landing in
# this PUBLIC, source-available repo — the class gitleaks doesn't catch
# (staging hostnames, CP DB schema, SSH-as-root chains, internal paths).
#
# This is the authoritative gate: the lefthook pre-push hook runs the same
# scan locally for fast feedback, but `git push --no-verify` bypasses it —
# this job does not. It IS a required status check on main.
#
# One honest limit, since this comment used to claim the job "cannot be
# bypassed": `enforce_admins` is false on this repo, so `gh pr merge --admin`
# overrides every required check, including this one. That merge path is used
# deliberately (a green local bundle), so the claim was never true. A leak into
# a PUBLIC repo is exactly the thing not to be complacent about.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  public-repo-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Scan tracked tree for internal-infra leaks
        run: bash scripts/public-repo-guard.sh
