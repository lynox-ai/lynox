name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['docs/**']
  pull_request:
    paths-ignore: ['docs/**']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: '8.21.2'
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz
          sudo mv gitleaks /usr/local/bin/
      - name: Run gitleaks
        run: gitleaks detect --source . --verbose --redact

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: pnpm/action-setup@v6
        with: { version: 'latest' }
      - run: pnpm install --frozen-lockfile

      # Dependency audit via osv-scanner. audit-ci was replaced 2026-04-15
      # because it shells out to `pnpm audit`, and pnpm audit still hits the
      # retired npm legacy advisory endpoint (HTTP 410). osv-scanner reads
      # pnpm-lock.yaml natively and queries OSV.dev (aggregates GHSA + npm
      # advisories + more). High/critical fail the job; moderate/low are
      # reported as warnings to match the prior Phase 1 policy.
      - name: Install osv-scanner
        run: |
          curl -sSfL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o /tmp/osv-scanner
          chmod +x /tmp/osv-scanner
          sudo mv /tmp/osv-scanner /usr/local/bin/osv-scanner
          osv-scanner --version
      - name: Scan dependencies (high+critical hard-fail)
        run: |
          set -euo pipefail
          osv-scanner scan source --lockfile=pnpm-lock.yaml --format=json --output=/tmp/osv.json || true
          osv-scanner scan source --lockfile=pnpm-lock.yaml || true
          HIGH=$(jq '[.results[]?.packages[]?.vulnerabilities[]? | select((.database_specific.severity // "") | IN("HIGH","CRITICAL"))] | length' /tmp/osv.json)
          TOTAL=$(jq '[.results[]?.packages[]?.vulnerabilities[]?] | length' /tmp/osv.json)
          echo "total=${TOTAL} high_or_critical=${HIGH}"
          if [ "${HIGH}" -gt 0 ]; then
            echo "::error::${HIGH} high/critical vulnerability(ies) — failing CI"
            exit 1
          fi
          if [ "${TOTAL}" -gt 0 ]; then
            echo "::warning::${TOTAL} moderate/low vulnerability(ies) reported (not blocking)"
          fi

      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm exec vitest run --coverage
      - name: Check coverage threshold
        run: node --input-type=module -e "import{readFileSync}from'node:fs';const r=JSON.parse(readFileSync('./coverage/coverage-summary.json','utf8')).total;const p=r.lines.pct;console.log('Line coverage '+p+'%');if(p<65)process.exit(1)"

  docker-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          tags: lynox:ci-scan
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: lynox:ci-scan
          format: table
          exit-code: 1
          severity: CRITICAL
