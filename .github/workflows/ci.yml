name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['docs/**']
  pull_request:
    paths-ignore: ['docs/**']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: '8.21.2'
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz
          sudo mv gitleaks /usr/local/bin/
      - name: Run gitleaks
        run: gitleaks detect --source . --verbose --redact

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: pnpm/action-setup@v4
        with: { version: 'latest' }
      - run: pnpm install --frozen-lockfile
      # prod-only, high+ — transitive build-tool vulns are tolerated
      - run: pnpm audit --prod --audit-level=high
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm exec vitest run --coverage
      - name: Check coverage threshold
        run: node --input-type=module -e "import{readFileSync}from'node:fs';const r=JSON.parse(readFileSync('./coverage/coverage-summary.json','utf8')).total;const p=r.lines.pct;console.log('Line coverage '+p+'%');if(p<65)process.exit(1)"

  docker-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: lynox:ci-scan
      - uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: lynox:ci-scan
          format: table
          exit-code: 1
          severity: CRITICAL
