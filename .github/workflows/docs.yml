name: Docs

on:
  push:
    branches: [main]
    paths: ['docs/**']
  pull_request:
    paths: ['docs/**']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: pnpm/action-setup@v6
        with: { version: 'latest' }
      - run: pnpm install --frozen-lockfile
        working-directory: docs
      - run: pnpm build
        working-directory: docs

      # Auto-deploy to Cloudflare Pages staging branch on every main push.
      # Maps to staging.docs.lynox.ai (custom domain bound to the 'staging'
      # branch of the lynox-docs Pages project).
      - name: Deploy to Cloudflare Pages (staging)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist --project-name=lynox-docs --branch=staging --commit-dirty=true
