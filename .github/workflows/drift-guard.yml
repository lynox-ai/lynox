name: Drift Guard

# Catches the mechanizable slices of documentation/code drift that gitleaks +
# public-repo-guard don't: committed merge-conflict markers, removed features
# reappearing in live docs, and dead path references in CLAUDE.md / docs /
# READMEs. The lefthook pre-push hook runs the same scan locally; this job is the
# gate — `git push --no-verify` skips the hook, not this. It IS a required status
# check on main.
#
# It is not, however, "unbypassable", which this comment used to claim:
# `enforce_admins` is false on this repo, so `gh pr merge --admin` overrides every
# required check, and that is a merge path the project uses deliberately. Say what
# the guard actually does — a guard described as stronger than it is buys a false
# sense of safety, which is worse than a guard known to be partial.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  drift-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Scan tracked tree for mechanizable drift
        run: bash scripts/drift-guard.sh
