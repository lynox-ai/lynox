name: Staging Image

on:
  push:
    branches: [main]
    paths-ignore: ['docs/**']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # amd64-only build (see the matrix comment): builds on the native amd64 runner
  # and pushes by digest; the `manifest` job below stitches that single digest
  # into the `:staging` + `:staging-${sha}` tags. Kept as the push-by-digest +
  # manifest pattern (not a direct tag push) so re-introducing arm64 later is a
  # one-line matrix add. Pattern: https://docs.docker.com/build/ci/github-actions/multi-platform/
  # Staging deploys to the staging engine host (Hetzner = amd64); arm64 lives in
  # release.yml, where Apple-Silicon `:latest` pulls actually matter.
  build:
    # Burst of merges (e.g. 4 squash-merges seconds apart) used to fan out into
    # 4 parallel builds + 4 staging redeploys, with the final `:staging` tag
    # racing whoever finished last. Collapse to one in-flight build per `main`
    # — cancel any pending/running build when a new one queues, so only the
    # latest commit ships. Group is scoped to the trigger so a manual
    # `workflow_dispatch` rerun (operator recovering a transient failure) is
    # not racing a regular push, and vice versa.
    #
    # The single matrix entry gets its own concurrency group; manifest has its
    # own scoped group below.
    concurrency:
      group: staging-build-${{ github.event_name }}-${{ matrix.arch_tag }}
      cancel-in-progress: true
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        include:
          # amd64 only: staging redeploys to the staging engine host (Hetzner = amd64),
          # which never uses an arm64 layer. The arm64 build existed solely so an
          # Apple-Silicon dev could `docker pull :staging` locally — a workflow we
          # don't use (we test via the staging engine host or local `pnpm dev`). Dropping
          # it makes the staging deploy a single native build with no arm64-runner
          # queue + no manifest wait. Multi-arch stays in release.yml (npm `:latest`,
          # where Apple-Silicon pulls genuinely matter). Kept as a 1-entry matrix so
          # the push-by-digest + manifest + dispatch chain below is untouched.
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch_tag: amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # amd64-only: build with load+tag-for-scan so trivy can read the same
      # layers we ship. arm64's base image surface is platform-identical to
      # amd64's, so the arm64 scan would add zero CVE coverage. The
      # push-by-digest build below re-uses the gha cache, so this is
      # essentially free on its second invocation.
      - name: Build (load) for trivy scan
        if: matrix.platform == 'linux/amd64'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          tags: ghcr.io/lynox-ai/lynox:scan-staging
          build-args: |
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha,scope=staging-${{ matrix.arch_tag }}
          cache-to: type=gha,mode=max,scope=staging-${{ matrix.arch_tag }}

      - name: Scan image for vulnerabilities
        if: matrix.platform == 'linux/amd64'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/lynox-ai/lynox:scan-staging
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

      - name: Set build metadata
        id: meta
        run: |
          echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      # Push by digest only — no human-readable tag yet. The `manifest` job
      # below stitches the per-arch digests into `:staging` and
      # `:staging-${sha}`. push-by-digest=true + name-canonical=true is the
      # canonical multi-runner pattern. OCI labels are baked into each
      # per-arch image config here so they survive the imagetools stitch.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/lynox-ai/lynox,push-by-digest=true,name-canonical=true,push=true
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha,scope=staging-${{ matrix.arch_tag }}
          cache-to: type=gha,mode=max,scope=staging-${{ matrix.arch_tag }}

      - name: Export digest
        env:
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          # Strip the "sha256:" prefix for a filesystem-safe filename; the
          # manifest job re-applies the prefix when constructing image refs.
          touch "/tmp/digests/${BUILD_DIGEST#sha256:}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.arch_tag }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Stitch the per-arch digests into the final `:staging` + `:staging-${sha}`
  # tags. This is the only job that produces human-readable tags — `build`
  # only pushes by digest. Also surfaces the `sha` output that the
  # downstream `dispatch` job consumes.
  manifest:
    needs: build
    concurrency:
      group: staging-manifest-${{ github.event_name }}
      cancel-in-progress: true
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build metadata
        id: meta
        run: |
          echo "sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"

      # Only `:staging` is guaranteed to track main's tip — the per-SHA
      # `:staging-<sha>` companion tag is sparse: any commit whose build was
      # cancelled mid-burst won't have one. Treat `:staging-<sha>` as
      # best-effort archival, never as a stable rollback target.
      - name: Create manifest tags
        env:
          SHA: ${{ steps.meta.outputs.sha }}
        run: |
          set -euo pipefail
          # Re-apply the "sha256:" prefix that we stripped when exporting digests.
          DIGEST_REFS=()
          for f in /tmp/digests/*; do
            digest_name="$(basename "$f")"
            DIGEST_REFS+=("ghcr.io/lynox-ai/lynox@sha256:${digest_name}")
          done
          if [ "${#DIGEST_REFS[@]}" -ne 1 ]; then
            echo "Expected 1 digest (amd64), got ${#DIGEST_REFS[@]}: ${DIGEST_REFS[*]}"
            exit 1
          fi
          for TAG in \
            "ghcr.io/lynox-ai/lynox:staging" \
            "ghcr.io/lynox-ai/lynox:staging-${SHA}"; do
            echo "::group::Creating manifest $TAG"
            docker buildx imagetools create -t "$TAG" "${DIGEST_REFS[@]}"
            echo "::endgroup::"
          done

      # Verify the manifest landed with the amd64 image (the only arch staging
      # ships — see the matrix comment above). Multi-arch lives in release.yml.
      - name: Verify manifest
        run: |
          set -euo pipefail
          INSPECT=$(docker buildx imagetools inspect "ghcr.io/lynox-ai/lynox:staging" --raw)
          echo "$INSPECT"
          echo "$INSPECT" | grep -q '"architecture": "amd64"' || { echo "amd64 missing from manifest"; exit 1; }
          echo "Manifest verified: amd64 present."

  # Separate job — deliberately NOT in the build/manifest concurrency
  # group, so a newer push that cancels an in-flight build cannot also
  # cancel this dispatch once it's running. `needs: manifest` ensures we
  # only fire on a manifest that completed successfully (i.e. actually
  # published `:staging`).
  # Trade-off: a 4-merge burst whose builds all somehow finish will produce
  # 4 dispatches in close succession instead of 1. Pro's redeploy is
  # idempotent (pull + recreate to whatever `:staging` currently points at),
  # so duplicates only cost extra image pulls, not correctness.
  dispatch:
    needs: manifest
    runs-on: ubuntu-latest
    steps:
      # Trigger engine redeploy on staging.lynox.cloud in the pro repo.
      # Pro's staging-engine-redeploy.yml listens for this event and calls
      # the prod control plane admin API to `docker pull + recreate` the
      # staging managed instance with the freshly pushed :staging image.
      # Keeps the prod admin token out of this public repo — only the
      # dispatch PAT lives here, which can only trigger workflows, not
      # call the admin API directly.
      - name: Dispatch engine redeploy to lynox-pro
        env:
          PRO_DISPATCH_TOKEN: ${{ secrets.PRO_DISPATCH_TOKEN }}
          SHA: ${{ needs.manifest.outputs.sha }}
        run: |
          curl -sSf -X POST \
            -H "Authorization: Bearer $PRO_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/lynox-ai/lynox-pro/dispatches \
            -d "{\"event_type\":\"engine-image-updated\",\"client_payload\":{\"sha\":\"$SHA\",\"tag\":\"staging\"}}"
