name: Staging Image

on:
  push:
    branches: [main]
    paths-ignore: ['docs/**']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    # Burst of merges (e.g. 4 squash-merges seconds apart) used to fan out into
    # 4 parallel builds + 4 staging redeploys, with the final `:staging` tag
    # racing whoever finished last. Collapse to one in-flight build per `main`
    # — cancel any pending/running build when a new one queues, so only the
    # latest commit ships. Group is scoped to the trigger so a manual
    # `workflow_dispatch` rerun (operator recovering a transient failure) is
    # not racing a regular push, and vice versa.
    concurrency:
      group: staging-build-${{ github.event_name }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build metadata
        id: meta
        run: |
          echo "sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          load: true
          tags: ghcr.io/lynox-ai/lynox:scan-staging
          # Same build-args as the push step below so trivy scans the same
          # layers we ship and the gha cache is shared between both invocations.
          build-args: |
            BUILD_SHA=${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/lynox-ai/lynox:scan-staging
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

      # Only `:staging` is guaranteed to track main's tip — the per-SHA
      # `:staging-<sha>` companion tag is sparse: any commit whose build was
      # cancelled mid-burst won't have one. Treat `:staging-<sha>` as
      # best-effort archival, never as a stable rollback target.
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/lynox-ai/lynox:staging
            ghcr.io/lynox-ai/lynox:staging-${{ steps.meta.outputs.sha }}
          labels: |
            org.opencontainers.image.revision=${{ steps.meta.outputs.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}
          build-args: |
            BUILD_SHA=${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Separate job — deliberately NOT in the build's concurrency group, so a
  # newer push that cancels an in-flight `build` cannot also cancel this
  # dispatch once it's running. `needs: build` ensures we only fire on a
  # build that completed successfully (i.e. actually pushed `:staging`).
  # Trade-off: a 4-merge burst whose builds all somehow finish will produce
  # 4 dispatches in close succession instead of 1. Pro's redeploy is
  # idempotent (pull + recreate to whatever `:staging` currently points at),
  # so duplicates only cost extra image pulls, not correctness.
  dispatch:
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Trigger engine redeploy on staging.lynox.cloud in the pro repo.
      # Pro's staging-engine-redeploy.yml listens for this event and calls
      # the prod control plane admin API to `docker pull + recreate` the
      # staging managed instance with the freshly pushed :staging image.
      # Keeps the prod admin token out of this public repo — only the
      # dispatch PAT lives here, which can only trigger workflows, not
      # call the admin API directly.
      - name: Dispatch engine redeploy to lynox-pro
        env:
          PRO_DISPATCH_TOKEN: ${{ secrets.PRO_DISPATCH_TOKEN }}
          SHA: ${{ needs.build.outputs.sha }}
        run: |
          curl -sSf -X POST \
            -H "Authorization: Bearer $PRO_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/lynox-ai/lynox-pro/dispatches \
            -d "{\"event_type\":\"engine-image-updated\",\"client_payload\":{\"sha\":\"$SHA\",\"tag\":\"staging\"}}"
