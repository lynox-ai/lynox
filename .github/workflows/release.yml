name: Release

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: pnpm/action-setup@v6
        with: { version: 'latest' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm exec vitest run

  # Gate: verify NPM_TOKEN is valid before any docker/npm side effects.
  # Protects against token drift — see scripts/pre-release-check.sh for history.
  pre-release-check:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify NPM_TOKEN is valid
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: ./scripts/pre-release-check.sh

  # This workflow builds and publishes artifacts only.
  # It does NOT deploy to any managed instance.
  # Production deploy is always manual via admin API after explicit confirmation.
  docker:
    needs: pre-release-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from release tag
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_CREATED: ${{ github.event.release.created_at }}
        run: |
          # Strip leading 'v' if present (v1.0.0 -> 1.0.0)
          VERSION="${RELEASE_TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "created=${RELEASE_CREATED}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          load: true
          tags: ghcr.io/lynox-ai/lynox:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/lynox-ai/lynox:scan
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/lynox-ai/lynox:latest
            ghcr.io/lynox-ai/lynox:${{ steps.version.outputs.version }}
            ghcr.io/lynox-ai/lynox:${{ github.sha }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.version.outputs.created }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  npm:
    needs: pre-release-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - uses: pnpm/action-setup@v6
        with: { version: 'latest' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Production docs deploy to Cloudflare Pages (lynox-docs project, main branch).
  # Staging docs deploy runs on every main push via docs.yml; this job only
  # fires on a release tag and maps to the production custom domain.
  deploy-docs-prod:
    needs: [docker, npm]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: pnpm/action-setup@v6
        with: { version: 'latest' }
      - run: pnpm install --frozen-lockfile
        working-directory: docs
      - run: pnpm build
        working-directory: docs

      - name: Deploy to Cloudflare Pages (production)
        working-directory: docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist --project-name=lynox-docs --branch=main --commit-dirty=true

  # Cross-repo dispatch to lynox-pro for production web + control plane deploy.
  # Pro listens for `engine-release-published` via:
  #   - release-web.yml           — wrangler pages deploy lynox-web --branch=main
  #   - release-control-plane.yml — rsync + migrate + rebuild control.lynox.cloud
  # Keeps the prod admin token + control plane SSH key out of this public repo.
  #
  # ── APPROVAL GATE ─────────────────────────────────────────────────
  # This job runs under the "production" GitHub environment, which has a
  # required-reviewer protection rule (Rafael). The dispatch to lynox-pro
  # WILL NOT FIRE until Rafael manually approves the pending deployment
  # on the GH Actions run page. This is the security boundary honoring
  # feedback_production_deploy_safety: cut-release.sh + release.yml push
  # the release up to the tag layer, but the actual fan-out to pro (and
  # downstream to control.lynox.cloud) requires an explicit human go.
  #
  # The gate lives here in core (public repo) instead of in pro because
  # environment protection rules on private repos require GitHub Team+
  # at the org level, and GH's feature propagation after a plan upgrade
  # is unreliable. Core is public, so protection rules are free here
  # regardless of any org-level billing state. If the pro org's Team
  # plan eventually propagates, we can add a second gate on pro's side
  # as belt-and-suspenders without changing this one.
  #
  # ── SECURITY NOTES ────────────────────────────────────────────────
  # Release tag + sha are passed through env vars (never interpolated
  # directly into the shell command) and the JSON payload is built with
  # `jq -n` to avoid any shell injection risk via a specially-crafted
  # tag string. PRO_DISPATCH_TOKEN should be a fine-grained PAT with
  # actions:write on lynox-ai/lynox-pro only, rotated ~every 90 days.
  dispatch-pro-release:
    needs: [docker, npm]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://control.lynox.cloud
    steps:
      - name: Dispatch release to lynox-pro
        env:
          PRO_DISPATCH_TOKEN: ${{ secrets.PRO_DISPATCH_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          PAYLOAD=$(jq -n \
            --arg version "$VERSION" \
            --arg tag "$RELEASE_TAG" \
            --arg sha "$RELEASE_SHA" \
            '{event_type: "engine-release-published", client_payload: {version: $version, tag: $tag, sha: $sha}}')
          curl -sSf -X POST \
            -H "Authorization: Bearer $PRO_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/lynox-ai/lynox-pro/dispatches \
            -d "$PAYLOAD"
