name: Release

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: pnpm/action-setup@v6
        with: { version: '10' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm exec vitest run

  # Gate: verify NPM_TOKEN is valid before any docker/npm side effects.
  # Protects against token drift — see scripts/pre-release-check.sh for history.
  pre-release-check:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify NPM_TOKEN is valid
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: ./scripts/pre-release-check.sh

  # Matrix split: each platform builds on its native arch runner — no QEMU.
  # Each matrix job pushes its image by digest only (no human-readable tag
  # yet); the `docker-manifest` job below stitches both digests into the
  # final multi-arch tags via `docker buildx imagetools create`.
  # Pattern documented at
  # https://docs.docker.com/build/ci/github-actions/multi-platform/#distribute-build-across-multiple-runners
  #
  # `fail-fast: true` — if amd64 fails, don't bother finishing arm64.
  docker-build:
    needs: pre-release-check
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch_tag: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch_tag: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # amd64-only: build with load+tag-for-scan so trivy can read the same
      # layers we ship. arm64's base image (node:22-alpine) has the same
      # OS-package surface as amd64's, so a second arm64 scan adds zero CVE
      # coverage — keep it amd64-only to match prior behavior. The
      # push-by-digest build below re-uses the gha cache, so this step is
      # essentially free on its second invocation.
      - name: Build (load) for trivy scan
        if: matrix.platform == 'linux/amd64'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          tags: ghcr.io/lynox-ai/lynox:scan
          build-args: |
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.arch_tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch_tag }}

      - name: Scan image for vulnerabilities
        if: matrix.platform == 'linux/amd64'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/lynox-ai/lynox:scan
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

      - name: Extract version from release tag
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_CREATED: ${{ github.event.release.created_at }}
        run: |
          # Strip leading 'v' if present (v1.0.0 -> 1.0.0)
          VERSION="${RELEASE_TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "created=${RELEASE_CREATED}" >> "$GITHUB_OUTPUT"

      # Push by digest only — no human-readable tag yet. The manifest job
      # below stitches the per-arch digests into `:latest`, `:${version}`,
      # `:${sha}`. push-by-digest=true + name-canonical=true is the
      # canonical multi-runner pattern. OCI labels are baked into each
      # per-arch image config here so they survive the imagetools stitch.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/lynox-ai/lynox,push-by-digest=true,name-canonical=true,push=true
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.version.outputs.created }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.arch_tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch_tag }}

      - name: Export digest
        env:
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          # Strip the "sha256:" prefix for a filesystem-safe filename; the
          # manifest job re-applies the prefix when constructing image refs.
          touch "/tmp/digests/${BUILD_DIGEST#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch_tag }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Stitch the per-arch digests into the final multi-arch tags. This is the
  # only job that produces human-readable tags — `docker-build` only pushes
  # by digest. `docker buildx imagetools create` builds a manifest list and
  # pushes it under each requested tag in one round trip per tag.
  docker-manifest:
    needs: docker-build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from release tag
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_CREATED: ${{ github.event.release.created_at }}
        run: |
          # Strip leading 'v' if present (v1.0.0 -> 1.0.0)
          VERSION="${RELEASE_TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "created=${RELEASE_CREATED}" >> "$GITHUB_OUTPUT"

      - name: Create multi-arch manifest
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Re-apply the "sha256:" prefix that we stripped when exporting digests.
          DIGEST_REFS=()
          for f in /tmp/digests/*; do
            digest_name="$(basename "$f")"
            DIGEST_REFS+=("ghcr.io/lynox-ai/lynox@sha256:${digest_name}")
          done
          if [ "${#DIGEST_REFS[@]}" -ne 2 ]; then
            echo "Expected 2 digests (amd64+arm64), got ${#DIGEST_REFS[@]}: ${DIGEST_REFS[*]}"
            exit 1
          fi
          for TAG in \
            "ghcr.io/lynox-ai/lynox:latest" \
            "ghcr.io/lynox-ai/lynox:${VERSION}" \
            "ghcr.io/lynox-ai/lynox:${SHA}"; do
            echo "::group::Creating manifest $TAG"
            docker buildx imagetools create -t "$TAG" "${DIGEST_REFS[@]}"
            echo "::endgroup::"
          done

      # Verify the multi-arch manifest landed — fails the workflow if either
      # arch is missing. Pre-launch we cannot ship a workflow that silently
      # regresses to single-arch.
      - name: Verify multi-arch manifest
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          INSPECT=$(docker buildx imagetools inspect "ghcr.io/lynox-ai/lynox:${VERSION}" --raw)
          echo "$INSPECT"
          echo "$INSPECT" | grep -q '"architecture": "amd64"' || { echo "amd64 missing from manifest"; exit 1; }
          echo "$INSPECT" | grep -q '"architecture": "arm64"' || { echo "arm64 missing from manifest"; exit 1; }
          echo "Multi-arch manifest verified: amd64 + arm64 both present."

  npm:
    needs: pre-release-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - uses: pnpm/action-setup@v6
        with: { version: '10' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Production docs deploy to Cloudflare Pages (lynox-docs project, main branch).
  # Staging docs deploy runs on every main push via docs.yml; this job only
  # fires on a release tag and maps to the production custom domain.
  deploy-docs-prod:
    needs: [docker-manifest, npm]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: pnpm/action-setup@v6
        with: { version: '10' }
      - run: pnpm install --frozen-lockfile
        working-directory: docs
      - run: pnpm build
        working-directory: docs

      - name: Deploy to Cloudflare Pages (production)
        working-directory: docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist --project-name=lynox-docs --branch=main --commit-dirty=true

  # Cross-repo dispatch to lynox-pro for production web + control plane deploy.
  # Pro listens for `engine-release-published` via:
  #   - release-web.yml           — wrangler pages deploy lynox-web --branch=main
  #   - release-control-plane.yml — rsync + migrate + rebuild control.lynox.cloud
  # Keeps the prod admin token + control plane SSH key out of this public repo.
  #
  # Gate: the GitHub Release publication is itself the intentional gate.
  # cut-release.sh only tags + publishes after a release PR merges, so a
  # release event always represents a deliberate human decision. No second
  # reviewer gate here — matches the staging dispatch pattern.
  #
  # Security: release tag + sha go through env vars (never interpolated
  # directly into the shell command), and the JSON payload is built with
  # `jq -n` to avoid injection via a crafted tag. PRO_DISPATCH_TOKEN is a
  # fine-grained PAT with actions:write on lynox-ai/lynox-pro only.
  dispatch-pro-release:
    needs: [docker-manifest, npm]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Dispatch release to lynox-pro
        env:
          PRO_DISPATCH_TOKEN: ${{ secrets.PRO_DISPATCH_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          PAYLOAD=$(jq -n \
            --arg version "$VERSION" \
            --arg tag "$RELEASE_TAG" \
            --arg sha "$RELEASE_SHA" \
            '{event_type: "engine-release-published", client_payload: {version: $version, tag: $tag, sha: $sha}}')
          curl -sSf -X POST \
            -H "Authorization: Bearer $PRO_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/lynox-ai/lynox-pro/dispatches \
            -d "$PAYLOAD"

      # Record a GitHub Deployment for visual tracking on the Deployments page.
      # PR #142 (2026-04-23) removed `environment: production` from this job to
      # drop a manual reviewer gate that was blocking releases for hours; the
      # side effect was that GH stopped creating Deployment objects, so the
      # Deployments page froze at v1.3.3. This restores the visual record
      # without re-introducing a blocking gate — the deployment is created and
      # immediately marked `success` after the cross-repo dispatch succeeds.
      # RELEASE_TAG is read via env: (not interpolated into the script) — same
      # safe pattern as the dispatch step above.
      - name: Record GitHub Deployment (production)
        uses: actions/github-script@v9
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const dep = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: tag,
              environment: 'production',
              required_contexts: [],
              auto_merge: false,
              production_environment: true,
              description: `Engine ${tag} dispatched to lynox-pro`,
            });
            if (typeof dep.data.id !== 'number') {
              throw new Error(`Unexpected createDeployment response: ${JSON.stringify(dep.data)}`);
            }
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: dep.data.id,
              state: 'success',
              description: 'Cross-repo dispatch to lynox-pro succeeded',
            });
