name: Release

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: pnpm/action-setup@v4
        with: { version: 'latest' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm exec vitest run

  docker:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from release tag
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_CREATED: ${{ github.event.release.created_at }}
        run: |
          # Strip leading 'v' if present (v1.0.0 -> 1.0.0)
          VERSION="${RELEASE_TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "created=${RELEASE_CREATED}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          load: true
          tags: ghcr.io/lynox-ai/lynox:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/lynox-ai/lynox:scan
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/lynox-ai/lynox:latest
            ghcr.io/lynox-ai/lynox:${{ steps.version.outputs.version }}
            ghcr.io/lynox-ai/lynox:${{ github.sha }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.version.outputs.created }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  npm:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - uses: pnpm/action-setup@v4
        with: { version: 'latest' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
