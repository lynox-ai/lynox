pre-push:
  commands:
    security-scan:
      run: sh scripts/security-scan.sh
    public-repo-guard:
      # Block internal infra / control-plane / ops leaks (staging hostnames,
      # CP DB schema, SSH-as-root chains) from reaching this PUBLIC repo —
      # the class gitleaks doesn't catch. Scans the whole tracked tree; the
      # CI job re-runs it so `git push --no-verify` can't slip a leak past.
      run: bash scripts/public-repo-guard.sh
      skip:
        - merge
        - rebase
    drift-guard:
      # Catch the mechanizable slices of doc/code drift gitleaks + public-repo-
      # guard don't: committed merge-conflict markers, removed features (Telegram
      # /WhatsApp/MCP) reappearing in live docs, and dead `path/file` references
      # in CLAUDE.md / docs / READMEs. Re-run by CI so --no-verify can't bypass.
      run: bash scripts/drift-guard.sh
      skip:
        - merge
        - rebase
    positioning-guard:
      # Keep public hero/landing copy + the npm description aligned with
      # POSITIONING.md (Vocabulary → Avoid): no legacy category labels
      # ("AI engine", "agent runtime"), no OSI-flavoured "open source", no
      # tired "The AI that…" patterns. Tightly scoped to copy surfaces.
      run: bash scripts/positioning-guard.sh
      skip:
        - merge
        - rebase

pre-commit:
  commands:
    # gitleaks/pattern-scan belong here, not pre-push: `--staged` and
    # `git diff --cached` only see content at COMMIT time (the index is empty at
    # push), so at pre-push they were no-ops. CI `gitleaks detect` is the real gate.
    gitleaks:
      run: gitleaks protect --staged --verbose
      skip:
        - merge
        - rebase
    pattern-scan:
      run: >-
        git diff --cached --name-only -z |
        xargs -0 grep -rlE
        '(sk-ant-|AKIA[A-Z0-9]{16}|ghp_[a-zA-Z0-9]{36}|xoxb-|xapp-|-----BEGIN (RSA |EC )?PRIVATE KEY-----)'
        -- || true
      fail_text: "Potential secrets detected in staged files"
    typecheck:
      run: npm run typecheck
      stage_fixed: true
    hex-guard:
      # PRD-LIGHT-MODE PR 3 — fail if a web-ui change introduces hardcoded
      # 6-digit hex outside the allowlisted asset-export / categorical paths.
      run: bash packages/web-ui/scripts/hex-guard.sh
      skip:
        - merge
        - rebase
    token-contract:
      # hex-guard allowlists app.css — "the token definitions themselves" — so
      # nothing guarded the VALUES in it. These primitives are painted on more
      # than one surface (this UI, and the lynox.ai site, a separate codebase),
      # so a change here is a change over there. Fail now, on your commit,
      # rather than by someone else weeks later.
      #
      # Fast local feedback only. The gate is .github/workflows/token-contract.yml
      # — `--no-verify` skips this hook, not that.
      glob:
        - "packages/web-ui/src/app.css"
        - "packages/web-ui/tokens.contract.json"
      run: node packages/web-ui/scripts/check-token-contract.mjs
      skip:
        - merge
        - rebase
    shape-contract:
      # The colour half of the contract stopped the two surfaces' TOKENS drifting.
      # Nothing stopped their SHAPES: a design system draws the chat turn, the tool
      # call, the inbox row and the state surface by hand, from reading these
      # components, and two of the four were wrong within a week of being drawn.
      # shapes.contract.json is that reading, written down; this asserts the
      # components still have the shapes it records.
      #
      # Globs every component it cites, not just the contract — the drift that matters
      # is someone restyling a shape here without knowing it is drawn over there.
      #
      # Fast local feedback only. The gate is the same workflow.
      glob:
        - "packages/web-ui/shapes.contract.json"
        - "packages/web-ui/src/lib/components/*.svelte"
        - "packages/web-ui/src/lib/primitives/*.svelte"
      run: node packages/web-ui/scripts/check-shape-contract.mjs
      skip:
        - merge
        - rebase
